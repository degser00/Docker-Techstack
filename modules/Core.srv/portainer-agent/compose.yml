services:
  portainer-agent:
    container_name: portainer_agent
    image: portainer/agent:2.33.6
    ports:
      - '9001:9001'
    privileged: True
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host:ro
